name: Advanced CI Workflow

on:
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  deploy:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Deploy Step
        run: echo "Application Deployed Successfully"